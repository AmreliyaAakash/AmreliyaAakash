<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#302b63;#24243e;#0f0c29" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#24243e;#0f0c29;#302b63" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#302b63;#24243e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5f6d"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#2575fc"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" rx="18" fill="url(#bgGrad)"/>

  <!-- floating particles -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="60" cy="220" r="2.5">
      <animate attributeName="cy" values="220;20;220" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="240" r="1.8">
      <animate attributeName="cy" values="240;10;240" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="230" r="2.2">
      <animate attributeName="cy" values="230;15;230" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="250" r="1.6">
      <animate attributeName="cy" values="250;30;250" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="245" r="2">
      <animate attributeName="cy" values="245;20;245" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating code glyphs -->
  <g font-family="Fira Code, monospace" font-size="22" fill="#ffffff" opacity="0.12">
    <text x="40" y="60">&lt;/&gt;</text>
    <text x="800" y="70">{ }</text>
    <text x="70" y="200">const</text>
    <text x="760" y="190">=&gt;</text>
  </g>

  <!-- orbiting ring around monogram -->
  <g transform="translate(120,130)">
    <circle r="46" fill="none" stroke="url(#textGrad)" stroke-width="2" opacity="0.5" stroke-dasharray="6 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="34" fill="#1a1a2e" stroke="#ffffff33" stroke-width="1.5"/>
    <text x="0" y="10" text-anchor="middle" font-family="Fira Code, monospace" font-size="26" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">AA</text>
  </g>

  <!-- main glowing name -->
  <text x="220" y="115" font-family="Verdana, sans-serif" font-size="46" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    Amreliya Aakash
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle with typing cursor -->
  <text x="220" y="155" font-family="Fira Code, monospace" font-size="20" fill="#e5e5f0">
    Full Stack Developer &#8226; MERN &#8226; Next.js
  </text>
  <rect x="640" y="140" width="10" height="22" fill="#ffffff">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- underline sweep -->
  <rect x="220" y="170" width="0" height="3" fill="url(#textGrad)">
    <animate attributeName="width" values="0;430;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
