<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5f6d"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#2575fc"/>
    </linearGradient>
  </defs>

  <rect width="500" height="160" fill="transparent"/>

  <!-- Self-drawing cursive-style signature path for "Aakash" -->
  <path d="M 30 110
           C 30 70, 55 60, 65 100
           C 70 115, 80 90, 85 70
           C 90 55, 100 55, 100 80
           C 100 100, 110 100, 115 85
           M 130 60
           C 130 60, 130 110, 130 110
           M 130 85
           C 140 75, 155 75, 155 90
           C 155 105, 140 105, 135 95
           M 175 60
           C 175 60, 175 110, 175 110
           M 175 90
           C 185 75, 205 75, 205 95
           C 205 110, 190 110, 185 100
           M 225 70
           C 235 65, 250 65, 250 80
           C 250 95, 230 95, 225 90
           C 225 105, 240 108, 250 100
           M 270 60
           C 270 60, 265 110, 270 110
           C 280 110, 285 90, 290 80
           C 293 90, 298 110, 305 110
           M 320 70
           C 330 65, 345 65, 345 85
           C 345 100, 330 100, 325 90"
        fill="none" stroke="url(#inkGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="1400" stroke-dashoffset="1400">
    <animate attributeName="stroke-dashoffset" from="1400" to="0" dur="3.5s" fill="freeze" begin="0s"/>
  </path>

  <!-- flourish underline that draws after the signature -->
  <path d="M 20 130 C 120 150, 280 150, 400 128" fill="none" stroke="url(#inkGrad)" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="450" stroke-dashoffset="450">
    <animate attributeName="stroke-dashoffset" from="450" to="0" dur="1.2s" begin="3.4s" fill="freeze"/>
  </path>

  <!-- pen tip that "writes" then fades -->
  <circle r="5" fill="#ffffff">
    <animateMotion dur="3.5s" fill="freeze"
      path="M 30 110 C 30 70, 55 60, 65 100 C 70 115, 80 90, 85 70 C 90 55, 100 55, 100 80 C 100 100, 110 100, 115 85"/>
    <animate attributeName="opacity" values="1;1;0" dur="3.5s" fill="freeze"/>
  </circle>

  <!-- subtitle fades in after signature completes -->
  <text x="30" y="150" font-family="Fira Code, monospace" font-size="14" fill="#a855f7" opacity="0">
    hand-drawn, not a template
    <animate attributeName="opacity" values="0;0;0.85" dur="5s" begin="0s" fill="freeze"/>
  </text>
</svg>
